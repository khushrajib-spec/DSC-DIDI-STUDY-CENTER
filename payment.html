<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Payment</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0d0d14;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:380px;
    background:#1e1e2e;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 30px rgba(124,58,237,.4);
}

h1{
    color:#a855f7;
    margin-bottom:10px;
}

.amount{
    font-size:32px;
    color:#f59e0b;
    font-weight:bold;
    margin:20px 0;
}

.qr{
    width:260px;
    border-radius:15px;
    margin:20px auto;
}

.note{
    color:#bbb;
    margin-top:15px;
}

.btn{
    display:inline-block;
    margin-top:25px;
    background:#25d366;
    color:white;
    text-decoration:none;
    padding:15px 30px;
    border-radius:50px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="card">

<h1>DSC DIDI STUDY CENTER</h1>

<h2>Basic to Advanced English Batch</h2>

<div class="amount">₹1000</div>

<img id="qr-code" src="" alt="Payment QR Code">

<p class="note">
Scan the QR code using PhonePe, Google Pay or Paytm and complete the payment.
</p>

<a href="https://wa.me/917070496842?text=I have completed the payment for Basic to Advanced English Batch." class="btn">
I've Paid
</a>

</div>

</body>
</html>
